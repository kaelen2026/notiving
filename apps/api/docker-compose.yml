services:
  postgres:
    image: postgres:16-alpine
    container_name: notiving-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notiving
      POSTGRES_USER: notiving
      POSTGRES_PASSWORD: notiving
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
